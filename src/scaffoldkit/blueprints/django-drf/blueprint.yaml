name: django-drf
display_name: "Django + DRF Backend"
description: "Production-ready Django REST Framework backend with project structure, API guidance, and AI context"
version: "1.0.0"
stack: "python-django"

metadata:
  architecture: "django-drf-api"
  python_ecosystem: true

variables:
  - name: project_name
    description: "Project slug (lowercase, hyphens)"
    type: string
    default: "my-django-api"
    required: true

  - name: display_name
    description: "Human-readable project name"
    type: string
    default: "My Django API"
    required: true

  - name: description
    description: "Short project description"
    type: string
    default: "A Django REST Framework backend"
    required: true

  - name: python_version
    description: "Python version to target"
    type: choice
    choices:
      - "3.11"
      - "3.12"
      - "3.13"
    default: "3.12"
    required: true

  - name: package_manager
    description: "Primary dependency workflow"
    type: choice
    choices:
      - "uv"
      - "poetry"
      - "pip-tools"
    default: "uv"
    required: true

  - name: database
    description: "Primary database engine"
    type: choice
    choices:
      - "postgresql"
      - "mysql"
      - "sqlite"
    default: "postgresql"
    required: true

  - name: auth_strategy
    description: "Authentication approach"
    type: choice
    choices:
      - "session"
      - "jwt"
      - "token"
      - "oauth2"
      - "none"
    default: "jwt"
    required: true

  - name: use_docker
    description: "Include Docker guidance"
    type: boolean
    default: true

  - name: use_celery
    description: "Include Celery worker guidance"
    type: boolean
    default: false

  - name: use_channels
    description: "Include Django Channels guidance"
    type: boolean
    default: false

  - name: use_drf_spectacular
    description: "Document drf-spectacular / OpenAPI usage"
    type: boolean
    default: true

  - name: test_strategy
    description: "Testing approach"
    type: choice
    choices:
      - "pytest-django"
      - "pytest-django-and-integration"
      - "full-pyramid"
    default: "pytest-django-and-integration"
    required: true

  - name: ai_context
    description: "Generate AI context guidance"
    type: boolean
    default: true

templates:
  - source: README.md.j2
    target: README.md

  - source: pyproject.toml.j2
    target: pyproject.toml

  - source: requirements.txt.j2
    target: requirements.txt

  - source: requirements-dev.txt.j2
    target: requirements-dev.txt

  - source: .dockerignore.j2
    target: .dockerignore
    condition: use_docker

  - source: Dockerfile.j2
    target: Dockerfile
    condition: use_docker

  - source: docker-compose.yml.j2
    target: docker-compose.yml
    condition: use_docker

  - source: docs/architecture.md.j2
    target: docs/architecture.md

  - source: docs/ways-of-working.md.j2
    target: docs/ways-of-working.md

  - source: docs/api-conventions.md.j2
    target: docs/api-conventions.md

  - source: docs/adrs/0001-architecture.md.j2
    target: docs/adrs/0001-architecture.md

  - source: AI_CONTEXT.md.j2
    target: AI_CONTEXT.md
    condition: ai_context

static_files:
  - source: .editorconfig
    target: .editorconfig

  - source: .gitignore
    target: .gitignore

directories:
  - config
  - config/settings
  - apps
  - apps/api
  - apps/api/migrations
  - apps/users
  - apps/users/migrations
  - apps/common
  - tests
  - tests/integration
  - docs/adrs
