name: fastapi-backend
display_name: "FastAPI Backend"
description: "Production-ready FastAPI backend with layered application structure, API guidance, and AI context"
version: "1.0.0"
stack: "python-fastapi"

metadata:
  architecture: "fastapi-service"
  python_ecosystem: true

variables:
  - name: project_name
    description: "Project slug (lowercase, hyphens)"
    type: string
    default: "my-fastapi-service"
    required: true

  - name: display_name
    description: "Human-readable project name"
    type: string
    default: "My FastAPI Service"
    required: true

  - name: description
    description: "Short project description"
    type: string
    default: "A FastAPI backend service"
    required: true

  - name: python_version
    description: "Python version to target"
    type: choice
    choices:
      - "3.11"
      - "3.12"
      - "3.13"
    default: "3.12"
    required: true

  - name: package_manager
    description: "Primary dependency and environment workflow"
    type: choice
    choices:
      - "uv"
      - "poetry"
      - "pip-tools"
    default: "uv"
    required: true

  - name: db_provider
    description: "Primary database provider"
    type: choice
    choices:
      - "postgresql"
      - "mysql"
      - "sqlite"
    default: "postgresql"
    required: true

  - name: auth_strategy
    description: "Authentication approach"
    type: choice
    choices:
      - "jwt"
      - "oauth2"
      - "api-key"
      - "none"
    default: "jwt"
    required: true

  - name: use_docker
    description: "Include Docker and compose guidance"
    type: boolean
    default: true

  - name: use_redis
    description: "Include Redis integration guidance"
    type: boolean
    default: false

  - name: use_background_jobs
    description: "Include background job worker guidance"
    type: boolean
    default: false

  - name: api_docs
    description: "Expose automatic OpenAPI docs"
    type: boolean
    default: true

  - name: test_strategy
    description: "Testing approach"
    type: choice
    choices:
      - "pytest-only"
      - "pytest-and-integration"
      - "full-pyramid"
    default: "pytest-and-integration"
    required: true

  - name: ai_context
    description: "Generate AI context guidance"
    type: boolean
    default: true

templates:
  - source: README.md.j2
    target: README.md

  - source: pyproject.toml.j2
    target: pyproject.toml

  - source: requirements.txt.j2
    target: requirements.txt

  - source: requirements-dev.txt.j2
    target: requirements-dev.txt

  - source: .dockerignore.j2
    target: .dockerignore
    condition: use_docker

  - source: Dockerfile.j2
    target: Dockerfile
    condition: use_docker

  - source: docker-compose.yml.j2
    target: docker-compose.yml
    condition: use_docker

  - source: docs/architecture.md.j2
    target: docs/architecture.md

  - source: docs/ways-of-working.md.j2
    target: docs/ways-of-working.md

  - source: docs/api-conventions.md.j2
    target: docs/api-conventions.md

  - source: docs/adrs/0001-architecture.md.j2
    target: docs/adrs/0001-architecture.md

  - source: AI_CONTEXT.md.j2
    target: AI_CONTEXT.md
    condition: ai_context

static_files:
  - source: .editorconfig
    target: .editorconfig

  - source: .gitignore
    target: .gitignore

directories:
  - app
  - app/api
  - app/api/routes
  - app/core
  - app/models
  - app/repositories
  - app/services
  - app/workers
  - tests
  - tests/integration
  - alembic
  - alembic/versions
  - docs/adrs
