name: static-site
display_name: "Static Site"
description: "Static website or documentation site with framework choice, styling, and deployment config"
version: "1.0.0"
stack: "static"

metadata:
  architecture: "static"
  site_types:
    - docs
    - blog
    - landing-page
    - portfolio

variables:
  - name: project_name
    description: "Project slug (lowercase, hyphens)"
    type: string
    default: "my-site"
    required: true

  - name: display_name
    description: "Human-readable site name"
    type: string
    default: "My Site"
    required: true

  - name: description
    description: "Short description of what the site is about"
    type: string
    default: "A static website"
    required: true

  - name: site_type
    description: "Kind of site being built"
    type: choice
    choices:
      - "docs"
      - "blog"
      - "landing-page"
      - "portfolio"
    default: "docs"
    required: true

  - name: framework
    description: "Static site framework"
    type: choice
    choices:
      - "astro"
      - "nextjs-static"
      - "hugo"
      - "eleventy"
    default: "astro"
    required: true

  - name: styling
    description: "CSS approach"
    type: choice
    choices:
      - "tailwind"
      - "vanilla-css"
      - "scss"
    default: "tailwind"
    required: true

  - name: use_cms
    description: "Use a content management system"
    type: boolean
    default: false

  - name: cms_type
    description: "CMS approach (only used when use_cms is true)"
    type: choice
    choices:
      - "markdown-files"
      - "headless-cms"
      - "git-based"
    default: "markdown-files"

  - name: use_i18n
    description: "Include internationalization (i18n) support"
    type: boolean
    default: false

  - name: use_analytics
    description: "Include analytics integration"
    type: boolean
    default: false

  - name: use_ci
    description: "Include CI/CD pipeline config"
    type: boolean
    default: true

  - name: deploy_target
    description: "Deployment platform"
    type: choice
    choices:
      - "vercel"
      - "netlify"
      - "github-pages"
      - "cloudflare-pages"
    default: "vercel"
    required: true

  - name: ai_context
    description: "Generate AI context file for agent workflows"
    type: boolean
    default: true

templates:
  - source: README.md.j2
    target: README.md

  - source: package.json.j2
    target: package.json

  # --- Astro runnable starter (gated on framework == astro) ---
  - source: astro.config.mjs.j2
    target: astro.config.mjs
    condition: is_astro

  - source: tsconfig.json.j2
    target: tsconfig.json
    condition: is_astro

  - source: src/layouts/Base.astro.j2
    target: src/layouts/Base.astro
    condition: is_astro

  - source: src/pages/index.astro.j2
    target: src/pages/index.astro
    condition: is_astro

  - source: src/styles/global.css.j2
    target: src/styles/global.css
    condition: is_astro

  - source: src/content.config.ts.j2
    target: src/content.config.ts
    condition: is_astro

  - source: src/content/docs/index.md.j2
    target: src/content/docs/index.md
    condition: is_astro_docs

  - source: src/content/blog/welcome.md.j2
    target: src/content/blog/welcome.md
    condition: is_astro_blog

  - source: src/content/projects/example-project.md.j2
    target: src/content/projects/example-project.md
    condition: is_astro_portfolio

  - source: src/content/sections/hero.md.j2
    target: src/content/sections/hero.md
    condition: is_astro_landing_page

  - source: tailwind.config.mjs.j2
    target: tailwind.config.mjs
    condition: is_astro_tailwind

  - source: tests/site.test.mjs.j2
    target: tests/site.test.mjs
    condition: is_astro

  - source: .github/workflows/deploy.yml.j2
    target: .github/workflows/deploy.yml
    condition: use_ci

  - source: docs/architecture.md.j2
    target: docs/architecture.md

  - source: docs/ways-of-working.md.j2
    target: docs/ways-of-working.md

  - source: docs/adrs/0001-architecture.md.j2
    target: docs/adrs/0001-architecture.md

  - source: docs/content-guide.md.j2
    target: docs/content-guide.md

  - source: AI_CONTEXT.md.j2
    target: AI_CONTEXT.md
    condition: ai_context

static_files:
  - source: .editorconfig
    target: .editorconfig

  - source: .gitignore
    target: .gitignore

directories:
  - src
  - src/pages
  - src/components
  - src/layouts
  - src/content
  - src/assets
  - public
  - docs/adrs
