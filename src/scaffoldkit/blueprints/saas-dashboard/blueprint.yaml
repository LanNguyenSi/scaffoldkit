name: saas-dashboard
display_name: "SaaS Dashboard"
description: "Full-stack SaaS dashboard with monorepo structure, docs, and AI context"
version: "1.0.0"
stack: "fullstack"

metadata:
  architecture: "monorepo"
  default_pages:
    - dashboard
    - detail
    - settings

variables:
  - name: project_name
    description: "Project slug (lowercase, hyphens)"
    type: string
    default: "my-saas-app"
    required: true

  - name: display_name
    description: "Human-readable project name"
    type: string
    default: "My SaaS App"
    required: true

  - name: description
    description: "Short project description"
    type: string
    default: "A modern SaaS dashboard application"
    required: true

  - name: stack
    description: "Technology stack"
    type: choice
    choices:
      - "nextjs-fullstack"
      - "symfony-api-react"
      - "django-htmx"
      - "rails-hotwire"
    default: "nextjs-fullstack"
    required: true

  - name: architecture_style
    description: "Architecture approach"
    type: choice
    choices:
      - "monorepo"
      - "modular-monolith"
      - "microservices"
    default: "monorepo"
    required: true

  - name: use_ddd
    description: "Use Domain-Driven Design patterns"
    type: boolean
    default: false

  - name: use_auth
    description: "Include authentication setup"
    type: boolean
    default: true

  - name: use_docker
    description: "Include Docker configuration"
    type: boolean
    default: true

  - name: use_ci
    description: "Include CI/CD pipeline config"
    type: boolean
    default: true

  - name: test_strategy
    description: "Testing approach"
    type: choice
    choices:
      - "unit-and-integration"
      - "e2e-focused"
      - "full-pyramid"
    default: "unit-and-integration"
    required: true

  - name: design_style
    description: "UI design direction"
    type: choice
    choices:
      - "minimal-clean"
      - "corporate-professional"
      - "playful-modern"
    default: "minimal-clean"
    required: true

  - name: ai_context
    description: "Generate AI context files for agent workflows"
    type: boolean
    default: true

templates:
  - source: README.md.j2
    target: README.md

  - source: package.json.j2
    target: package.json
    condition: is_nextjs_fullstack

  - source: apps/web/nextjs/.env.local.example.j2
    target: apps/web/.env.local.example
    condition: is_nextjs_fullstack

  - source: apps/web/nextjs/package.json.j2
    target: apps/web/package.json
    condition: is_nextjs_fullstack

  - source: apps/web/nextjs/tsconfig.json.j2
    target: apps/web/tsconfig.json
    condition: is_nextjs_fullstack

  - source: apps/web/nextjs/app/layout.tsx.j2
    target: apps/web/app/layout.tsx
    condition: is_nextjs_fullstack

  - source: apps/web/nextjs/app/page.tsx.j2
    target: apps/web/app/page.tsx
    condition: is_nextjs_fullstack

  - source: apps/api/node/package.json.j2
    target: apps/api/package.json
    condition: is_nextjs_fullstack

  - source: apps/api/node/.env.example.j2
    target: apps/api/.env.example
    condition: is_nextjs_fullstack

  - source: apps/api/node/tsconfig.json.j2
    target: apps/api/tsconfig.json
    condition: is_nextjs_fullstack

  - source: apps/api/node/src/index.ts.j2
    target: apps/api/src/index.ts
    condition: is_nextjs_fullstack

  - source: packages/shared/package.json.j2
