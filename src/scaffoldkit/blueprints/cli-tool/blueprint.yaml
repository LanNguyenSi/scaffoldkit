name: cli-tool
display_name: "CLI Tool"
description: "Command-line tool project skeleton with docs, tests, and AI context"
version: "1.0.0"
stack: "cli"

metadata:
  architecture: "command-based"
  supported_languages:
    - python
    - go
    - rust
    - typescript

variables:
  - name: project_name
    description: "Project slug (lowercase, hyphens)"
    type: string
    default: "my-cli"
    required: true

  - name: display_name
    description: "Human-readable name of the CLI tool"
    type: string
    default: "My CLI Tool"
    required: true

  - name: description
    description: "Short description of what the CLI does"
    type: string
    default: "A command-line tool"
    required: true

  - name: language
    description: "Implementation language"
    type: choice
    choices:
      - "python"
      - "go"
      - "rust"
      - "typescript"
    default: "python"
    required: true

  - name: cli_framework
    description: "CLI framework / library to use"
    type: choice
    choices:
      - "typer"
      - "click"
      - "cobra"
      - "clap"
      - "commander"
    default: "typer"
    required: true

  - name: distribution
    description: "How the CLI will be distributed to end users"
    type: choice
    choices:
      - "pip-package"
      - "binary"
      - "homebrew"
      - "docker"
    default: "pip-package"
    required: true

  - name: use_config_file
    description: "Support a persistent config file for user preferences"
    type: boolean
    default: true

  - name: config_format
    description: "Format of the config file (when use_config_file is true)"
    type: choice
    choices:
      - "yaml"
      - "toml"
      - "json"
    default: "yaml"

  - name: use_ci
    description: "Include CI/CD pipeline configuration"
    type: boolean
    default: true

  - name: test_strategy
    description: "Testing approach"
    type: choice
    choices:
      - "unit-tests"
      - "snapshot-testing"
      - "integration-tests"
    default: "unit-tests"
    required: true

  - name: ai_context
    description: "Generate AI_CONTEXT.md for agent workflows"
    type: boolean
    default: true

templates:
  - source: README.md.j2
    target: README.md

  - source: docs/architecture.md.j2
    target: docs/architecture.md

  - source: docs/ways-of-working.md.j2
    target: docs/ways-of-working.md

  - source: docs/adrs/0001-architecture.md.j2
    target: docs/adrs/0001-architecture.md

  - source: AI_CONTEXT.md.j2
    target: AI_CONTEXT.md
    condition: ai_context

  - source: package.json.j2
    target: package.json
    condition: is_typescript

  - source: tsconfig.json.j2
    target: tsconfig.json
    condition: is_typescript

  - source: src/main.ts.j2
    target: src/main.ts
    condition: is_typescript

  - source: src/commands/run.ts.j2
    target: src/commands/run.ts
    condition: is_typescript

  - source: src/commands/config.ts.j2
    target: src/commands/config.ts
    condition: is_typescript

  - source: src/config/loader.ts.j2
    target: src/config/loader.ts
    condition: is_typescript

  - source: tests/run.test.ts.j2
    target: tests/run.test.ts
    condition: is_typescript

static_files:
  - source: .editorconfig
    target: .editorconfig

  - source: .gitignore
    target: .gitignore

directories:
  - src
  - src/commands
  - src/config
  - tests
  - docs/adrs
