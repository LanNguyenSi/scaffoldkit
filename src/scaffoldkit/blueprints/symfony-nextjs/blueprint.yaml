name: symfony-nextjs
display_name: "Symfony + Next.js Fullstack"
description: "Production-ready monorepo with Symfony API backend and Next.js frontend"
version: "1.0.0"
stack: "fullstack"

metadata:
  architecture: "monorepo"
  default_pages:
    - dashboard
    - detail
    - form

variables:
  - name: project_name
    description: "Project slug (lowercase, hyphens only)"
    type: string
    default: "my-app"
    required: true

  - name: display_name
    description: "Human-readable project name"
    type: string
    default: "My App"
    required: true

  - name: description
    description: "Short project description"
    type: string
    default: "A fullstack application with Symfony API and Next.js frontend"
    required: true

  - name: php_version
    description: "PHP version for the Symfony backend"
    type: choice
    choices:
      - "8.2"
      - "8.3"
      - "8.4"
    default: "8.3"
    required: true

  - name: node_version
    description: "Node.js version for the Next.js frontend"
    type: choice
    choices:
      - "20"
      - "22"
    default: "22"
    required: true

  - name: api_style
    description: "How the Symfony backend exposes its API"
    type: choice
    choices:
      - "api-platform"
      - "custom-controllers"
    default: "api-platform"
    required: true

  - name: database
    description: "Database engine"
    type: choice
    choices:
      - "postgresql"
      - "mysql"
    default: "postgresql"
    required: true

  - name: use_ddd
    description: "Organise the Symfony backend with Domain-Driven Design layers"
    type: boolean
    default: false

  - name: use_auth
    description: "Include authentication (login, token management)"
    type: boolean
    default: true

  - name: auth_method
    description: "Authentication mechanism (only relevant when use_auth is true)"
    type: choice
    choices:
      - "jwt"
      - "oauth2"
    default: "jwt"

  - name: styling
    description: "CSS approach for the Next.js frontend"
    type: choice
    choices:
      - "tailwind"
      - "css-modules"
      - "scss"
    default: "tailwind"
    required: true

  - name: ui_library
    description: "Component library layered on top of the styling choice"
    type: choice
    choices:
      - "shadcn-ui"
      - "radix-ui"
      - "none"
    default: "shadcn-ui"

  - name: use_docker
    description: "Include Docker Compose setup for local development"
    type: boolean
    default: true

  - name: use_ci
    description: "Include GitHub Actions CI pipeline"
    type: boolean
    default: true

  - name: use_rabbitmq
    description: "Add RabbitMQ message broker (Symfony Messenger)"
    type: boolean
    default: false

  - name: use_redis
    description: "Add Redis for caching and/or sessions"
    type: boolean
    default: false

  - name: test_strategy
    description: "Testing depth across both stacks"
    type: choice
    choices:
      - "unit-and-integration"
      - "full-pyramid"
    default: "unit-and-integration"
    required: true

  - name: design_style
    description: "UI design direction"
    type: choice
    choices:
      - "minimal-clean"
      - "corporate-professional"
      - "playful-modern"
    default: "minimal-clean"
    required: true

  - name: ai_context
    description: "Generate AI_CONTEXT.md for agent-assisted development"
    type: boolean
    default: true

templates:
  - source: README.md.j2
    target: README.md

  - source: docs/architecture.md.j2
    target: docs/architecture.md

  - source: docs/ways-of-working.md.j2
    target: docs/ways-of-working.md

  - source: docs/adrs/0001-architecture.md.j2
    target: docs/adrs/0001-architecture.md

  - source: docs/api-contract.md.j2
    target: docs/api-contract.md

  - source: docs/page-templates/dashboard.md.j2
    target: docs/page-templates/dashboard.md

  - source: docs/page-templates/detail.md.j2
    target: docs/page-templates/detail.md

  - source: docs/page-templates/form.md.j2
    target: docs/page-templates/form.md

  - source: AI_CONTEXT.md.j2
    target: AI_CONTEXT.md
    condition: ai_context

static_files:
  - source: .editorconfig
    target: .editorconfig

  - source: .gitignore
    target: .gitignore

directories:
  - apps/api
  - apps/api/src
  - apps/api/src/Entity
  - apps/api/src/Repository
  - apps/api/src/Controller
  - apps/api/config
  - apps/api/migrations
  - apps/api/tests
  - apps/web
  - apps/web/src
  - apps/web/src/app
  - apps/web/src/components
  - apps/web/src/lib
  - apps/web/src/hooks
  - apps/web/src/types
  - apps/web/src/services
  - apps/web/public
  - packages/shared-types
  - docs/adrs
  - docs/page-templates
  - docker
  - scripts
