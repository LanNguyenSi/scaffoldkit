name: nextjs-frontend
display_name: "Next.js Frontend"
description: "Production-ready Next.js frontend project skeleton with docs, conventions, and AI context"
version: "1.0.0"
stack: "frontend"

metadata:
  framework: "nextjs"
  default_pages:
    - dashboard
    - detail
    - form

variables:
  - name: project_name
    description: "Project slug (lowercase, hyphens)"
    type: string
    default: "my-frontend"
    required: true

  - name: display_name
    description: "Human-readable project name"
    type: string
    default: "My Frontend"
    required: true

  - name: description
    description: "Short project description"
    type: string
    default: "A Next.js frontend application"
    required: true

  - name: nextjs_version
    description: "Next.js major version"
    type: choice
    choices:
      - "14"
      - "15"
    default: "15"
    required: true

  - name: router
    description: "Next.js routing paradigm"
    type: choice
    choices:
      - "app-router"
      - "pages-router"
    default: "app-router"
    required: true

  - name: language
    description: "Primary language"
    type: choice
    choices:
      - "typescript"
      - "javascript"
    default: "typescript"
    required: true

  - name: styling
    description: "CSS solution"
    type: choice
    choices:
      - "tailwind"
      - "css-modules"
      - "styled-components"
      - "scss"
    default: "tailwind"
    required: true

  - name: ui_library
    description: "Component library"
    type: choice
    choices:
      - "shadcn-ui"
      - "radix-ui"
      - "headless-ui"
      - "none"
    default: "shadcn-ui"
    required: true

  - name: state_management
    description: "Client-side state management approach"
    type: choice
    choices:
      - "zustand"
      - "react-query-only"
      - "jotai"
      - "redux-toolkit"
    default: "zustand"
    required: true

  - name: api_client
    description: "Data fetching and API client strategy"
    type: choice
    choices:
      - "fetch"
      - "axios"
      - "tanstack-query"
    default: "tanstack-query"
    required: true

  - name: use_auth
    description: "Include authentication setup"
    type: boolean
    default: true

  - name: auth_provider
    description: "Authentication provider (only used when use_auth is true)"
    type: choice
    choices:
      - "next-auth"
      - "custom-jwt"
      - "clerk"
    default: "next-auth"

  - name: use_i18n
    description: "Include internationalisation setup"
    type: boolean
    default: false

  - name: use_storybook
    description: "Include Storybook for component development"
    type: boolean
    default: false

  - name: use_docker
    description: "Include Dockerfile and docker-compose"
    type: boolean
    default: true

  - name: use_ci
    description: "Include CI/CD pipeline configuration"
    type: boolean
    default: true

  - name: test_strategy
    description: "Testing approach"
    type: choice
    choices:
      - "vitest-only"
      - "vitest-and-playwright"
      - "jest-and-cypress"
    default: "vitest-only"
    required: true

  - name: design_style
    description: "UI design direction"
    type: choice
    choices:
      - "minimal-clean"
      - "corporate-professional"
      - "playful-modern"
    default: "minimal-clean"
    required: true

  - name: ai_context
    description: "Generate AI context file for agent workflows"
    type: boolean
    default: true

templates:
  - source: README.md.j2
    target: README.md

  - source: package.json.j2
    target: package.json

  - source: tsconfig.json.j2
    target: tsconfig.json
    condition: is_typescript

  - source: .dockerignore.j2
    target: .dockerignore
    condition: use_docker

  - source: Dockerfile.j2
    target: Dockerfile
    condition: use_docker

  - source: docker-compose.yml.j2
    target: docker-compose.yml
    condition: use_docker

  - source: docker-compose.prod.yml.j2
    target: docker-compose.prod.yml
    condition: use_docker

  - source: .github/workflows/ci.yml.j2
    target: .github/workflows/ci.yml
    condition: use_ci

  - source: docs/architecture.md.j2
    target: docs/architecture.md

  - source: docs/ways-of-working.md.j2
    target: docs/ways-of-working.md

  - source: docs/adrs/0001-architecture.md.j2
    target: docs/adrs/0001-architecture.md

  - source: docs/component-guide.md.j2
    target: docs/component-guide.md

  - source: docs/page-templates/dashboard.md.j2
    target: docs/page-templates/dashboard.md

  - source: docs/page-templates/detail.md.j2
    target: docs/page-templates/detail.md

  - source: docs/page-templates/form.md.j2
    target: docs/page-templates/form.md

  - source: AI_CONTEXT.md.j2
    target: AI_CONTEXT.md
    condition: ai_context

static_files:
  - source: .editorconfig
    target: .editorconfig

  - source: .gitignore
    target: .gitignore

directories:
  - src
  - src/app
  - src/components
  - src/components/ui
  - src/components/layout
  - src/components/features
  - src/lib
  - src/hooks
  - src/types
  - src/styles
  - src/services
  - public
  - docs/adrs
  - docs/page-templates
