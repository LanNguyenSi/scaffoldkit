name: nextjs-fullstack
display_name: "Next.js Full-Stack App"
description: "Full-stack Next.js application with Prisma, PostgreSQL, Tailwind CSS, and AI agent context"
version: "1.0.0"
stack: "nextjs-fullstack"

metadata:
  architecture: "next-app-router"
  default_pages:
    - landing
    - listing
    - detail
    - admin-dashboard
    - admin-crud

variables:
  - name: project_name
    description: "Project slug (lowercase, hyphens)"
    type: string
    default: "my-app"
    required: true

  - name: display_name
    description: "Human-readable project name"
    type: string
    default: "My App"
    required: true

  - name: description
    description: "Short project description"
    type: string
    default: "A modern full-stack web application"
    required: true

  - name: language
    description: "Primary UI language"
    type: choice
    choices:
      - "en"
      - "de"
    default: "de"
    required: true

  - name: db_provider
    description: "Database provider"
    type: choice
    choices:
      - "postgresql"
      - "mysql"
      - "sqlite"
    default: "postgresql"
    required: true

  - name: auth_strategy
    description: "Authentication approach"
    type: choice
    choices:
      - "jwt"
      - "next-auth"
      - "none"
    default: "jwt"
    required: true

  - name: use_docker
    description: "Include Docker + Traefik deployment config"
    type: boolean
    default: true

  - name: use_email
    description: "Include email notification system (nodemailer)"
    type: boolean
    default: false

  - name: use_analytics
    description: "Include analytics dashboard (Recharts)"
    type: boolean
    default: false

  - name: use_csv_export
    description: "Include CSV export functionality"
    type: boolean
    default: false

  - name: use_waitlist
    description: "Include waitlist system"
    type: boolean
    default: false

  - name: use_markdown
    description: "Include Markdown rendering (react-markdown)"
    type: boolean
    default: true

  - name: use_og_tags
    description: "Include Open Graph meta tags"
    type: boolean
    default: true

  - name: ai_context
    description: "Generate .ai/ folder for agent workflows"
    type: boolean
    default: true

templates:
  - source: Makefile.j2
    target: Makefile

  - source: docker-compose.dev.yml.j2
    target: docker-compose.dev.yml
    condition: use_docker

  - source: Dockerfile.dev.j2
    target: Dockerfile.dev
    condition: use_docker

  - source: .husky-pre-commit.j2
    target: .husky-pre-commit

  - source: lint-staged.config.js.j2
    target: lint-staged.config.js

  - source: README.md.j2
    target: README.md

  - source: .ai/AGENTS.md.j2
    target: .ai/AGENTS.md
    condition: ai_context

  - source: .ai/ARCHITECTURE.md.j2
    target: .ai/ARCHITECTURE.md
    condition: ai_context

  - source: .ai/TASKS.md.j2
    target: .ai/TASKS.md
    condition: ai_context

  - source: .ai/DECISIONS.md.j2
    target: .ai/DECISIONS.md
    condition: ai_context

  - source: docs/architecture.md.j2
    target: docs/architecture.md

  - source: docs/ways-of-working.md.j2
    target: docs/ways-of-working.md

  - source: docs/adrs/0001-architecture.md.j2
    target: docs/adrs/0001-architecture.md

  - source: docs/page-templates/listing.md.j2
    target: docs/page-templates/listing.md

  - source: docs/page-templates/detail.md.j2
    target: docs/page-templates/detail.md

  - source: docs/page-templates/admin-dashboard.md.j2
    target: docs/page-templates/admin-dashboard.md

  - source: AI_CONTEXT.md.j2
    target: AI_CONTEXT.md
    condition: ai_context

static_files:
  - source: .editorconfig
    target: .editorconfig

  - source: .gitignore
    target: .gitignore

  - source: .dockerignore
    target: .dockerignore
    condition: use_docker

directories:
  - app/(public)
  - app/admin
  - app/api
  - components/public
  - components/admin
  - components/shared
  - lib
  - prisma
  - docs/adrs
  - docs/page-templates
  - .ai
