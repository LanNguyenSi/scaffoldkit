name: Build Prod Image
description: Builds the Prod image using PROD stage and pushes to GitHub Container Registry
inputs:
  image-name:
    description: Base image name
    required: true
  dockerfile:
    description: Path to Dockerfile
    required: true
    default: build/app/Dockerfile
  context:
    description: Build context path
    required: true
    default: .
runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push production image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        target: prod
        outputs: type=sbom,dest=/tmp/${{ inputs.image-name }}-${{ github.sha }}.sbom
        tags: |
          ${{ inputs.image-name }}:${{ github.sha }}
          ${{ inputs.image-name }}:latest
        sbom: true
        provenance: mode=max

    - name: Upload production SBOM
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.image-name }}-${{ github.sha }}-sbom-cache
        path: /tmp/${{ inputs.image-name }}-${{ github.sha }}.sbom
        retention-days: 1
