name: Build CI Image
description: Builds the CI image using DEV stage and stores as artifact
inputs:
  image-name:
    description: Base image name
    required: true
  dockerfile:
    description: Path to Dockerfile
    required: true
    default: build/app/Dockerfile
  context:
    description: Build context path
    required: true
    default: .
runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and export
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: false
        target: dev
        outputs: |
          type=docker,dest=/tmp/${{ inputs.image-name }}-${{ github.sha }}.tar
          type=sbom,dest=/tmp/${{inputs.image-name}}-${{ github.sha }}.sbom
        tags: ${{ inputs.image-name }}:${{ github.sha }}
        sbom: true
        provenance: mode=max

    - name: Upload CI image cache
      uses: actions/upload-artifact@v4
      with:
        name: ${{inputs.image-name}}-${{ github.sha }}-cache
        path: /tmp/${{inputs.image-name}}-${{ github.sha }}.tar
        retention-days: 7
        compression-level: 6

    - name: Upload CI SBOM
      uses: actions/upload-artifact@v4
      with:
        name: ${{inputs.image-name}}-${{ github.sha }}-sbom-cache
        path: /tmp/${{inputs.image-name}}-${{ github.sha }}.sbom
        retention-days: 7
