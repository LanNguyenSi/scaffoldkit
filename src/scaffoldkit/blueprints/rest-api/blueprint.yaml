name: rest-api
display_name: "REST API"
description: "REST API project skeleton with layered architecture, docs, and AI context"
version: "1.0.0"
stack: "backend"

metadata:
  architecture: "layered"
  layers:
    - routes
    - services
    - repositories
    - models

variables:
  - name: project_name
    description: "Project slug (lowercase, hyphens)"
    type: string
    default: "my-api"
    required: true

  - name: display_name
    description: "Human-readable project name"
    type: string
    default: "My API"
    required: true

  - name: description
    description: "Short description of what this API does"
    type: string
    default: "A RESTful API service"
    required: true

  - name: framework
    description: "Web framework"
    type: choice
    choices:
      - "fastapi"
      - "express"
      - "django-rest"
      - "spring-boot"
    default: "fastapi"
    required: true

  - name: database
    description: "Primary database"
    type: choice
    choices:
      - "postgresql"
      - "mysql"
      - "mongodb"
      - "sqlite"
    default: "postgresql"
    required: true

  - name: use_auth
    description: "Include authentication and authorization setup"
    type: boolean
    default: true

  - name: auth_strategy
    description: "Authentication strategy (only relevant when use_auth is true)"
    type: choice
    choices:
      - "jwt"
      - "oauth2"
      - "api-key"
    default: "jwt"
    condition: use_auth

  - name: use_docker
    description: "Include Docker and Docker Compose configuration"
    type: boolean
    default: true

  - name: use_ci
    description: "Include CI/CD pipeline configuration"
    type: boolean
    default: true

  - name: use_openapi
    description: "Include OpenAPI/Swagger documentation setup"
    type: boolean
    default: true

  - name: test_strategy
    description: "Testing approach"
    type: choice
    choices:
      - "unit-and-integration"
      - "contract-testing"
      - "full-pyramid"
    default: "unit-and-integration"
    required: true

  - name: ai_context
    description: "Generate AI context file for agent workflows"
    type: boolean
    default: true

templates:
  - source: README.md.j2
    target: README.md

  - source: pyproject.toml.j2
    target: pyproject.toml
    condition: is_fastapi

  - source: requirements.txt.j2
    target: requirements.txt
    condition: is_fastapi

  - source: requirements-dev.txt.j2
    target: requirements-dev.txt
    condition: is_fastapi

  - source: package.json.j2
    target: package.json
    condition: is_express

  - source: pom.xml.j2
    target: pom.xml
    condition: is_spring_boot

  - source: django-manage.py.j2
    target: manage.py
    condition: is_django_rest

  - source: django-pyproject.toml.j2
    target: pyproject.toml
    condition: is_django_rest

  - source: .dockerignore.j2
    target: .dockerignore
    condition: use_docker

  - source: Dockerfile.j2
    target: Dockerfile
    condition: use_docker

  - source: docker-compose.yml.j2
    target: docker-compose.yml
    condition: use_docker

  - source: .github/workflows/ci.yml.j2
    target: .github/workflows/ci.yml
    condition: use_ci

  - source: docs/architecture.md.j2
    target: docs/architecture.md

  - source: docs/ways-of-working.md.j2
    target: docs/ways-of-working.md

  - source: docs/adrs/0001-architecture.md.j2
    target: docs/adrs/0001-architecture.md

  - source: docs/api-design.md.j2
    target: docs/api-design.md

  - source: AI_CONTEXT.md.j2
    target: AI_CONTEXT.md
    condition: ai_context

static_files:
  - source: .editorconfig
    target: .editorconfig

  - source: .gitignore
    target: .gitignore

directories:
  - src
  - src/routes
  - src/models
  - src/middleware
  - src/config
  - tests
  - tests/integration
  - docs/adrs
