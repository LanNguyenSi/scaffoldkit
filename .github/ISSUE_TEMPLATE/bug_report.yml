name: Bug report
description: Report a defect in scaffoldkit
labels: ["bug"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - blueprint engine
        - template rendering
        - CLI
        - Docker image
        - install.sh
        - other / unsure
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Expected vs. actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal blueprint or commands that trigger the bug.
      render: bash
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: scaffoldkit version
      placeholder: "0.x.y"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14 / Ubuntu 22.04 / Windows 11"
